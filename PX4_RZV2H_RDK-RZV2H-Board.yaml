## Key Considerations

### Hardware Differences (RZV2H vs RA8P1)
- **CPU Architecture**: ARM Cortex-R8/Armv7-R (RZV2H) vs Cortex-M85/Armv8.1-M (RA8P1)
- **Memory Layout**: Different SRAM/Flash configurations
- **Peripheral Addresses**: RZV2H-specific memory map
- **Timer Channels**: Different GPT channel availability
- **Pin Multiplexing**: RZV2H-specific IOPORT configuration

### Critical Files to Create
1. `boards/renesas/rdk-rzv2h/default.px4board` - Board definition
  - boards/renesas/rdk-rzv2h/init/rc.board_defaults
  - boards/renesas/rdk-rzv2h/init/rc.board_defaults.cmds
  - boards/renesas/rdk-rzv2h/init/rc.offline_sensor_check
