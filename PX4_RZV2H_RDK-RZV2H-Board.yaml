### Phase 3: Port Key Components

#### 3.1 Board Configuration Files
- **`default.px4board`**: Define board capabilities, processor, memory, peripherals
  - Reference: `.refs/rzv2h_px4_freertos_fsp/px4/boards/renesas/rzv/default.px4board`
  - Adapt for RZV2H specifications (CR8 core0, memory layout, peripherals)

- **`board_config.h`**: PX4-specific board configuration
  - References: `boards/renesas/evk-ra8p1/nuttx-config/include/board.h`, `.refs/rzv2h_px4_freertos_fsp/px4/boards/renesas/rzv/src/board/board_config.h`, `.refs/rzv2h_px4_freertos_fsp/px4/boards/renesas/rzv/src/board/board_pwm_out.h`, `.refs/rzv2h_px4_freertos_fsp/px4/boards/renesas/rzv/src/board/rzv_serial_config.h`
  - Use RZV2H pinmap from `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/hardware/rzv2h/rzv2h_pinmap.h`
  - Define sensors, actuators, communication interfaces
  - Include rc defaults from `.refs/rzv2h_px4_freertos_fsp/px4/boards/renesas/rzv/init/rc.board_defaults.cmds`

#### 3.2 Initialization and Timer Configuration
- **`init.c`**: Board-specific initialization
  - Reference: `boards/renesas/evk-ra8p1/src/init.c`
  - Port FreeRTOS initialization concepts from `.refs/rzv2h_px4_freertos_fsp/src/platform/`

- **`timer_config.cpp`**: Timer/PWM channel configuration
  - Reference: `boards/renesas/evk-ra8p1/src/timer_config.cpp`
  - Map RZV2H GPT channels for PWM output

#### 3.3 IO Timer Framework
- Port RA8 IO timer framework to RZV:
  - Adapt `platforms/nuttx/src/px4/renesas/ra8/io_pins/io_timer.c` for RZV GPT hardware
  - Update register definitions using `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/hardware/rzv_gpt.h`
  - Implement PWM DShot and trigger support

#### 3.4 Platform Headers
- Create or adapt platform headers:
  - Define IO timer hardware description for RZV2H GPT timers
  - Map hardware capabilities to PX4 requirements
  - Define micro HAL for RZV2H architecture

### Phase 4: Integration Points

#### 4.1 FreeRTOS Plus POSIX Integration
- Analyze `.refs/rzv2h_px4_freertos_fsp/src/freertos_posix/` implementation
- Ensure compatibility with NuttX POSIX layer or create adaptation layer
- Consider threading model differences between FreeRTOS and NuttX

#### 4.2 Driver Mapping
Map FSP drivers to NuttX/PX4 equivalents:
- **Serial/UART**: Use `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/rzv_serial.c`
- **GPIO**: Use `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/rzv_gpio.c`
- **SPI**: Adapt from `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/rzv_spi.c`
- **I2C**: Adapt from `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/rzv_i2c.c` or `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/rzv_sci_i2c.c`
- **ADC**: Adapt from `platforms/nuttx/NuttX/nuttx/arch/arm/src/rzv/rzv_adc.c`

- Map FSP pin configuration: `.refs/rzv2h_px4_freertos_fsp/rzv_gen/pin_data.c`
- Peripheral integrations (from `.refs/rzv2h_px4_freertos_fsp`):
  - MPU9250 (SPI)
  - BMP388 (I2C)
  - RC (SCI/UART)
  - GP1S (SCI/UART)
  - TE1/MAVLink (SCI/UART)
