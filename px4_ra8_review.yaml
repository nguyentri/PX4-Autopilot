---
review:
  title: "PX4 BSP Enhancement for ESC Deployment via GPT Timers on Renesas EVK-RA8P1"

  objective: >
    Analyze, review, and fix the PX4 Board Support Package (BSP) for the Renesas EVK-RA8P1
    development board to enable reliable deployment of 4 Electronic Speed Controllers (ESCs)
    using the ra_gpt driver adapted to the PX4 stack. Focus on configuring io_timer,
    pwm_servo.c, pwm_trigger.c and DShot modules to support standard PWM and DShot protocols.
    Ensure correct timer–channel mapping, signal integrity, and motor control functionality
    for minimal flight-readiness.

  inputs:
    description: "Artifacts and code to be used as the basis for the review."
    items:
      - name: "Existing PX4 BSP for EVK-RA8P1"
        details: "Branch/PR that currently builds successfully for EVK-RA8P1."

      - name: "EVK-RA8P1 board configuration and init"
        files:
          - boards/renesas/evk-ra8p1/nuttx-config/include/board.h
          - boards/renesas/evk-ra8p1/src/board_config.h
          - boards/renesas/evk-ra8p1/src/init.c
          - boards/renesas/evk-ra8p1/src/timer_config.cpp
          - boards/renesas/evk-ra8p1/default.px4board

      - name: "RA GPT and GPIO drivers (PWM generation base)"
        files:
          - platforms/nuttx/NuttX/nuttx/arch/arm/src/ra8/hardware/ra8p1/ra8p1_memorymap.h
          - platforms/nuttx/NuttX/nuttx/arch/arm/src/ra8/hardware/ra8p1/ra8p1_pinmap.h
          - platforms/nuttx/NuttX/nuttx/arch/arm/src/ra8/hardware/ra_gpt.h
          - platforms/nuttx/NuttX/nuttx/arch/arm/src/ra8/hardware/ra_gpio.h
          - platforms/nuttx/NuttX/nuttx/arch/arm/src/ra8/ra_gpio.h
          - platforms/nuttx/NuttX/nuttx/arch/arm/src/ra8/ra_gpio.c

      - name: "Existing PX4 io_timer and PWM modules (Renesas RA8)"
        files:
          - platforms/nuttx/src/px4/renesas/ra8/io_pins/io_timer.c
          - platforms/nuttx/src/px4/renesas/ra8/io_pins/pwm_servo.c
          - platforms/nuttx/src/px4/renesas/ra8/io_pins/pwm_trigger.c
          - platforms/nuttx/src/px4/renesas/ra8/include/px4_arch/io_timer_hw_description.h
          - platforms/nuttx/src/px4/renesas/ra8/include/px4_arch/io_timer.h
          - platforms/nuttx/src/px4/renesas/ra8/include/px4_arch/micro_hal.h
          - platforms/nuttx/src/px4/renesas/ra8/include/px4_arch/hw_description.h

      - name: "Reference DShot configuration (Renesas EVK-RA8P1 DShot target)"
        files:
          - platforms/nuttx/src/px4/renesas/ra8/dshot/dshot.c
          - platforms/nuttx/src/px4/renesas/ra8/dshot/dshot.h
          - platforms/nuttx/src/px4/renesas/ra8/dshot/dshot_simple.c
          - platforms/nuttx/src/px4/renesas/ra8/dshot

      - name: "Reference NXP io_timer / DShot implementation"
        files:
          - platforms/nuttx/src/px4/nxp/imxrt/io_pins
          - platforms/nuttx/src/px4/nxp/imxrt/dshot

  source_paths_for_review:
    description: "Concrete files in the EVK-RA8P1 and related Renesas trees to review/modify."
    files:
      # EVK-RA8P1 board-level scripts and configs
      - boards/renesas/evk-ra8p1/init/rc.board
      - boards/renesas/evk-ra8p1/init/rc.board_sensors
      - boards/renesas/evk-ra8p1/init/rc.board_defaults
      - boards/renesas/evk-ra8p1/src/init.c
      - boards/renesas/evk-ra8p1/src/timer_config.cpp
      - boards/renesas/evk-ra8p1/default.px4board
      - boards/renesas/evk-ra8p1/dshot.px4board
      - boards/renesas/evk-ra8p1/test_sensors.sh
      - boards/renesas/evk-ra8p1/test.px4board
      - boards/renesas/evk-ra8p1/validate_board.sh
      - boards/renesas/evk-ra8p1/Kconfig
      - boards/renesas/evk-ra8p1/manifest.xml
      - boards/renesas/evk-ra8p1/src/board_config.h

      # Renesas RA8 DShot
      - platforms/nuttx/src/px4/renesas/ra8/dshot/dshot.h
      - platforms/nuttx/src/px4/renesas/ra8/dshot/dshot.c

      # RA8P1-specific PX4 arch headers
      - platforms/nuttx/src/px4/renesas/ra8p1/include/px4_arch/hw_description.h
      - platforms/nuttx/src/px4/renesas/ra8p1/include/px4_arch/io_timer_hw_description.h
      - platforms/nuttx/src/px4/renesas/ra8p1/include/px4_arch/io_timer.h

      # RZV shared implementation (used as reference for structure/patterns)
      - platforms/nuttx/src/px4/renesas/rzv/dshot/dshot.h
      - platforms/nuttx/src/px4/renesas/rzv/dshot/dshot.c
      - platforms/nuttx/src/px4/renesas/rzv/io_pins/io_timer.c
      - platforms/nuttx/src/px4/renesas/rzv/io_pins/pwm_servo.c

  deliverables:
    - id: gpt_timer_configuration
      title: "GPT Timer Configuration for ESCs"
      requirements:
        - "Configure ra_gpt driver to support 4 PWM outputs at 400 Hz."
        - "Ensure GPT timers are initialized with correct prescalers and duty cycle resolution."
        - "Validate timer synchronization and dead-time settings (if applicable)."
        - "Verify any required timer interrupts are correctly configured for PWM/DShot (if used)."

    - id: io_timer_pwm_integration
      title: "PX4 io_timer and pwm_out Integration"
      requirements:
        - "Map GPT timers to PX4 io_timer channels."
        - "Ensure pwm_out driver correctly interfaces with ra_gpt for PWM signal generation."
        - "Support both standard PWM and DShot150/300/600/1200 modes."
        - "Confirm GPIO alternate function, direction, and drive strength are configured for all ESC output pins."
        - "Confirm timer and GPIO interrupt enables are correctly configured where required (e.g. DShot, capture, safety)."
        - "Ensure interrupt callback functions are implemented, registered, and used safely (no busy wait where IRQ is expected)."

    - id: esc_signal_validation
      title: "ESC Signal Validation"
      requirements:
        - "Use oscilloscope or logic analyzer to verify PWM signal frequency, duty cycle, and timing accuracy."
        - "Confirm ESCs respond to arming and throttle commands via PX4 shell."
        - "If interrupts are used for timing or capture, validate callback execution timing and jitter."
      test_commands:
        - "pwm_out test -c 1 -p 1100"
        - "pwm_out test -c 1 -p 1000"

    - id: minimal_flight_config
      title: "Minimal Flight-Capable Configuration"
      requirements:
        - "Provide a working PX4 configuration enabling arming, attitude control, and hover bench test (props removed)."
        - "Include startup scripts and parameters for ESC initialization."

    - id: docs_and_build
      title: "Documentation and Build Instructions"
      requirements:
        - "Update README.md with GPT timer usage, ESC pin mapping, and DShot configuration."
        - "Explicitly document GPIO pin configuration (mode, AF, pull, drive) for ESC outputs."
        - "Document which interrupts are enabled (timer/GPIO/DMAC) and how callbacks are used."
        - "Provide build targets and instructions."
      build_targets:
        - "make renesas_evk-ra8p1_default"

  success_criteria:
    configuration_hygiene:
      - "Avoid duplication of macros between board_config.h, timer_config.cpp, io_timer.h, and io_timer.c."
      - "Avoid using hardcoded timer IDs, channel IDs, and pin numbers; use centralized definitions."

    gpio_and_interrupts:
      - "All ESC-related GPIO pins have explicit configuration (AF, direction, pull, drive, speed) in a single, well-documented location."
      - "No missing or implicit GPIO configuration relied upon from reset defaults."
      - "Required interrupts (GPT, GPIO, DMA, etc.) are explicitly enabled with correct priorities."
      - "Interrupt callback handlers are implemented, registered, and do not perform long blocking operations."
      - "No orphaned interrupt enables without a corresponding, safe callback implementation."

    build_quality:
      - "PX4 firmware builds cleanly with updated GPT, GPIO, and PWM configurations (no new warnings/errors)."

    esc_behavior:
      - "All 4 ESCs receive valid PWM or DShot signals."
      - "Motors respond correctly to PX4 commands (arming, throttle, basic tests)."

    system_tests:
      - "System passes arming and actuator output tests without errors."
      - "pwm_out test commands produce expected output on the documented pins."

    documentation:
      - "Documentation clearly outlines GPT usage, pin mapping, DShot configuration, setup steps, IRQ behavior, and troubleshooting."

  review_focus_by_file:
    boards/renesas/evk-ra8p1/src/board_config.h:
      - "Timer and pin mapping for 4 ESC outputs."
      - "Check for missing GPIO configuration macros for ESC pins (mode/AF, output type, pull, speed)."
      - "No duplicated or conflicting macros for timers/channels."
      - "No magic numbers: use named constants/macros only."

    boards/renesas/evk-ra8p1/src/timer_config.cpp:
      - "ra_gpt configuration for 400 Hz PWM and DShot base timing."
      - "Prescaler/period calculations explained and correct."
      - "Verify timer interrupt configuration where applicable (enable/disable, priority)."
      - "Confirm any timer interrupt callback registration is correctly wired to PX4 io_timer / DShot layers."
      - "Single source of truth aligned with board_config.h and io_timer_hw_description.h."

    boards/renesas/evk-ra8p1/src/init.c:
      - "Correct initialization order for clocks, GPIO, GPT, and PWM/DShot services."
      - "Explicit GPIO pin initialization for ESC outputs (no reliance on reset defaults)."
      - "Interrupt controller setup (NVIC or equivalent) for GPT/GPIO/DMAC, if used."
      - "No duplicated timer/GPIO setup logic that should live in timer_config.cpp or io_timer."

    platforms/nuttx/src/px4/renesas/ra8p1/include/px4_arch/io_timer_hw_description.h:
      - "Canonical mapping of GPT timers/channels to PX4 timer indices and functions."
      - "If interrupts are part of io_timer use, this file should clearly indicate which channels use IRQs."
      - "Used consistently by io_timer, without duplication elsewhere."

    platforms/nuttx/src/px4/renesas/ra8p1/include/px4_arch/io_timer.h:
      - "io_timer API exposes required modes (PWM, DShot, capture, etc.)."
      - "Check for functions that rely on IRQ-based operation and ensure their semantics are documented (e.g. callback types, context)."
      - "Clear separation of generic arch API vs board configuration."

    platforms/nuttx/src/px4/renesas/ra8/dshot/dshot.c:
      - "Correct low-level DShot bit-timing and integration with RA8 timers."
      - "Verify whether DShot is implemented with IRQs, DMA, or blocking loops and ensure interrupt use is correct."
      - "If IRQ-driven, confirm interrupts are enabled/disabled correctly and callbacks are implemented."
      - "Mode selection and mapping aligned with EVK-RA8P1 configuration."

    platforms/nuttx/src/px4/renesas/rzv/io_pins/io_timer.c:
      - "Used as reference for good io_timer structure and RA-family patterns."
      - "Review how GPIO configuration and interrupts are handled; align RA8P1 implementation with proven patterns where possible."

    platforms/nuttx/src/px4/renesas/rzv/io_pins/pwm_servo.c:
      - "Compare architecture and integration logic with RA8P1 PWM code to ensure consistency."
      - "Check how callbacks, if any, are used for timing or safety events."

    boards/renesas/evk-ra8p1/init/rc.board:
      - "High-level board startup; correct loading of pwm_out and related modules."
      - "Ensure any interrupt-dependent features are started only after IRQs and timers are fully initialized."
      - "Safe defaults (no unexpected motor spin at boot)."

    boards/renesas/evk-ra8p1/init/rc.board_defaults:
      - "Default parameters for PWM/DShot mode, rates, and channel masks."
      - "ESC-specific parameters (e.g., min/max PWM, protocol selection) documented."
      - "If IRQ-based features (e.g., capture) are toggled by parameters, ensure defaults are safe."